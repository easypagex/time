<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyPageX — Tim Berners-Lee</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0f1e;--accent:#00c2a8;--accent2:#0077ff;
    --text:#e8eaf0;--muted:#6b7280;--bubble:#1a2540;--border:rgba(0,194,168,0.2);
  }
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:2rem 1rem;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(0,194,168,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,194,168,0.04) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0;}
  .container{position:relative;z-index:1;max-width:520px;width:100%;
    display:flex;flex-direction:column;align-items:center;}
  .eyebrow{font-family:'Space Mono',monospace;font-size:0.65rem;
    letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);
    margin-bottom:1.4rem;opacity:0.85;}
  .bubble-wrap{width:100%;margin-bottom:0.5rem;min-height:90px;
    display:flex;align-items:flex-end;justify-content:center;}
  .bubble{background:var(--bubble);border:1px solid var(--border);
    border-radius:18px 18px 18px 4px;padding:1rem 1.3rem;font-size:0.95rem;
    line-height:1.55;color:var(--text);position:relative;max-width:88%;
    box-shadow:0 0 30px rgba(0,194,168,0.08);opacity:0;transform:translateY(6px);
    transition:opacity 0.4s ease,transform 0.4s ease;}
  .bubble.visible{opacity:1;transform:translateY(0);}
  .bubble::after{content:'';position:absolute;bottom:-10px;left:24px;
    width:0;height:0;border-left:10px solid transparent;
    border-right:0 solid transparent;border-top:10px solid var(--bubble);}
  .photo-frame{position:relative;cursor:pointer;user-select:none;margin-top:0.5rem;}
  .photo-frame::before{content:'';position:absolute;inset:-3px;border-radius:14px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    opacity:0;transition:opacity 0.3s;z-index:-1;}
  .photo-frame:hover::before{opacity:1;}
  .photo-frame img{width:280px;height:370px;object-fit:cover;object-position:top center;
    border-radius:12px;display:block;border:2px solid rgba(0,194,168,0.25);
    transition:filter 0.15s ease;}
  .photo-frame:active img{filter:brightness(0.85);}
  .click-hint{font-family:'Space Mono',monospace;font-size:0.58rem;
    color:var(--muted);text-align:center;margin-top:0.5rem;letter-spacing:0.1em;}
  .name-card{margin-top:1.2rem;text-align:center;}
  .name-card h1{font-size:1.15rem;font-weight:600;color:var(--text);letter-spacing:0.01em;}
  .name-card p{font-size:0.78rem;color:var(--accent);font-family:'Space Mono',monospace;
    margin-top:0.2rem;opacity:0.8;}
  .progress-dots{display:flex;gap:5px;margin-top:1.2rem;justify-content:center;flex-wrap:wrap;max-width:240px;}
  .dot{width:5px;height:5px;border-radius:50%;background:var(--muted);
    transition:background 0.3s,transform 0.3s;}
  .dot.active{background:var(--accent);transform:scale(1.4);}
  .cta-wrap{margin-top:2rem;width:100%;display:flex;justify-content:center;}
  .cta-btn{display:inline-flex;align-items:center;gap:0.6rem;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;font-family:'Space Grotesk',sans-serif;font-size:0.95rem;
    font-weight:600;padding:0.8rem 2rem;border-radius:50px;text-decoration:none;
    letter-spacing:0.02em;transition:transform 0.2s,box-shadow 0.2s;
    box-shadow:0 4px 24px rgba(0,194,168,0.25);}
  .cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,194,168,0.4);}
  .timer-ring{position:absolute;top:-6px;right:-6px;width:28px;height:28px;}
  .timer-ring circle{fill:none;stroke:var(--accent);stroke-width:3;
    stroke-dasharray:69.1;stroke-dashoffset:69.1;
    transform:rotate(-90deg);transform-origin:center;
    transition:stroke-dashoffset 0.1s linear;}
</style>
</head>

const sayings = [
  "“La Web es más una creación social que técnica.”",
  "“La diseñé para lograr un efecto social—ayudar a las personas a trabajar juntas.”",
  "“La idea original de la Web era que fuera un espacio colaborativo.”",
  "“Esto es para todos.” — tuiteado en vivo en la Ceremonia de Apertura de los JJ.OO. de Londres 2012",
  "“La Web debe permanecer abierta, libre y descentralizada si queremos que prospere.”",
  "“La Web que yo imaginé aún no la hemos visto. El futuro es todavía mucho más grande.”",
  "“Cualquiera que haya usado la Web sabe que es una herramienta muy poderosa, pero también muy frágil.”",
  "“El sistema de nombres de dominio es un monopolio y debe regularse como tal.”",
  "“Los datos son algo precioso y durarán más que los propios sistemas.”",
  "“La web es un espejo de la humanidad, que refleja tanto lo bueno como lo malo.”",
  "“Necesitamos construir una web donde las personas tengan control total sobre sus propios datos.”",
  "🔧 Curiosidad: Construyó su primera computadora con un soldádor y un viejo televisor de madera.",
  "📚 Curiosidad: Fue expulsado de las computadoras de Oxford por ser sorprendido hackeándolas.",
  "🧮 Curiosidad: Sus padres ayudaron a construir la primera computadora comercial del mundo.",
  "📖 Curiosidad: La web se inspiró en un libro de consejos domésticos del siglo XIX.",
  "📞 Curiosidad: Su primera aplicación web fue el directorio telefónico interno del CERN.",
  "🤦 Curiosidad: Admitió que la doble barra (//) en las URL fue una elección de diseño completamente inútil.",
  "💎 Curiosidad: Vendió su código fuente original de la web como NFT por $5,4 millones para obras benéficas."
];
let currentImg=1,currentSaying=0,elapsed=0;
const CYCLE=8000,TICK=100;
const photoEl=document.getElementById("timPhoto");
const bubbleEl=document.getElementById("bubble");
const dotsEl=document.getElementById("dots");
const timerCircle=document.getElementById("timerCircle");
sayings.forEach(function(_,i){
  var d=document.createElement("div");
  d.className="dot"+(i===0?" active":"");
  dotsEl.appendChild(d);
});
function playClick(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*0.05),ctx.sampleRate);
    var data=buf.getChannelData(0);
    for(var i=0;i<data.length;i++)
      data[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.009));
    var src=ctx.createBufferSource();
    src.buffer=buf;
    var gain=ctx.createGain();
    gain.gain.setValueAtTime(0.4,ctx.currentTime);
    src.connect(gain);gain.connect(ctx.destination);src.start();
  }catch(e){}
}
function showSaying(idx){
  bubbleEl.classList.remove("visible");
  setTimeout(function(){
    bubbleEl.textContent=sayings[idx];
    bubbleEl.classList.add("visible");
  },200);
  document.querySelectorAll(".dot").forEach(function(d,i){
    d.classList.toggle("active",i===idx);
  });
}
function toggleImage(){
  if(currentImg===1){photoEl.src=IMG2;currentImg=2;}
  else{photoEl.src=IMG1;currentImg=1;}
}
function advance(){
  playClick();toggleImage();
  currentSaying=(currentSaying+1)%sayings.length;
  showSaying(currentSaying);
}
function updateRing(){
  timerCircle.style.strokeDashoffset=69.1*(1-elapsed/CYCLE);
}
var timer=null;
function startTimer(){
  timer=setInterval(function(){
    elapsed+=TICK;updateRing();
    if(elapsed>=CYCLE){elapsed=0;advance();}
  },TICK);
}
function handleClick(){
  clearInterval(timer);elapsed=0;updateRing();
  advance();startTimer();
}
showSaying(0);startTimer();
</script>
